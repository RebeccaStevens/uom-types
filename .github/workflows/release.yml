name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  issues: write
  pages: write
  pull-requests: write

concurrency:
  group: Release
  cancel-in-progress: false

jobs:
  lint_js:
    uses: ./.github/workflows/lint-js.yml
  lint_knip:
    uses: ./.github/workflows/lint-knip.yml
  lint_markdown:
    uses: ./.github/workflows/lint-markdown.yml
  lint_packages:
    uses: ./.github/workflows/lint-packages.yml
  lint_spelling:
    uses: ./.github/workflows/lint-spelling.yml
  lint_yaml:
    uses: ./.github/workflows/lint-yaml.yml
  test_js:
    uses: ./.github/workflows/test-js.yml
  test_types:
    uses: ./.github/workflows/test-types.yml
  typecheck:
    uses: ./.github/workflows/typecheck.yml

  release:
    needs:
      - lint_js
      - lint_knip
      - lint_markdown
      - lint_packages
      - lint_spelling
      - lint_yaml
      - test_js
      - test_types
      - typecheck
    runs-on: ubuntu-latest
    outputs:
      released_version: ${{ steps.package-version.outputs.current-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/prepare

      - name: Build
        run: pnpm run build

      - name: Semantic Release
        run: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: package-version
        name: Get Released Version
        uses: martinbeentjes/npm-get-version-action@3cf273023a0dda27efcd3164bdfb51908dd46a5b # v1.3.1

  release_docs:
    needs:
      - release
    if: ${{ needs.release.outputs.released_version != '' }}
    uses: ./.github/workflows/release-docs.yml
    with:
      version: ${{ needs.release.outputs.released_version }}
