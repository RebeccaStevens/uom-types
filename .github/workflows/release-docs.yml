name: Release Docs

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: Release Docs
  cancel-in-progress: true

jobs:
  release_docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/prepare

      - name: Set released version
        run: pnpm version ${{ inputs.version }} --no-git-tag-version --allow-same-version

      - name: Generate Docs
        run: pnpm run docs

      - name: Create a pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ./docs/generated

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Update Coverage Badge
        run: cp ./docs/generated/coverage.svg ./docs/coverage.svg

      - id: coverage_changed
        run: echo "coverage_changed=$(git status --porcelain -u | grep -c docs/coverage.svg)" >> "$GITHUB_OUTPUT"

      - id: push_coverage
        env:
          COVERAGE_CHANGED: ${{ steps.coverage_changed.outputs.coverage_changed }}
        run: echo "push_coverage=$(if [[ "$COVERAGE_CHANGED" != '0' ]] ; then echo '1' ; else echo '0' ; fi)" >> "$GITHUB_OUTPUT"

      - if: steps.push_coverage.outputs.push_coverage != '0'
        run: |
          git add docs/coverage.svg
          git commit -m "docs: update documentation coverage badge"
          git push
