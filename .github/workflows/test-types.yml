name: Test Types

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  test_types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/prepare
      - run: pnpm run generate-files
      - run: pnpm run build
      - run: pnpm run test:types
